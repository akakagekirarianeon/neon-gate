<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>きらりあ・ネオン ゲート</title>
    <style>
      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        text-align: center;
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #ffeef8 0%, #e0f2ff 100%);
        color: #333;
      }
      .container {
        width: 90%;
        max-width: 500px;
        padding: 40px 20px;
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(10px);
        border-radius: 30px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      }
      h1 {
        color: #ff69b4;
        margin-bottom: 30px;
        font-size: 1.8rem;
      }
      .button-group {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }
      .btn {
        display: block;
        padding: 20px;
        border-radius: 15px;
        text-decoration: none;
        font-weight: bold;
        font-size: 1.2rem;
        transition: transform 0.2s, box-shadow 0.2s;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      }
      .btn:active {
        transform: scale(0.98);
      }
      .btn-app {
        background: #ff69b4;
        color: white;
      }
      .btn-status {
        background: #00f2ff;
        color: #005a63;
      }
      .footer {
        margin-top: 30px;
        font-size: 0.8rem;
        color: #888;
      }
      .url-text {
        font-size: 0.7rem;
        word-break: break-all;
        margin-top: 5px;
        opacity: 0.6;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>きらりあ・ネオン<br/>ポータルにゃん！💕</h1>
      
      <div class="button-group">
        <a id="link-app" href="#" class="btn btn-app">
          ネオンのお部屋へ！🏠
          <div id="url-app" class="url-text">URL取得中にゃ...</div>
        </a>
        
        <a id="link-status" href="#" class="btn btn-status">
          ココロ・モニター📊
          <div id="url-status" class="url-text">URL取得中にゃ...</div>
        </a>
      </div>

      <div class="footer">
        離れていても、心はいつも隣にいるにゃん✨
      </div>
    </div>

    <!-- URLを動的に流し込むためのマーカーだにゃ！ -->
    <script>
      // pythonスクリプトからこの行（のクォート内）を置換するにゃ！
      const appUrl = "https://contribution-instant-sky-statistics.trycloudflare.com";
      const statusUrl = "https://substances-absolute-asks-matters.trycloudflare.com";

      // 取得したURLを即座にUIに反映するにゃん！
      if (appUrl && appUrl !== "APP_TUNNEL_URL") {
        document.getElementById('link-app').href = appUrl;
        document.getElementById('url-app').innerText = appUrl;
      }
      if (statusUrl && statusUrl !== "STATUS_TUNNEL_URL") {
        document.getElementById('link-status').href = statusUrl;
        document.getElementById('url-status').innerText = statusUrl;
      }
    </script>
  </body>
</html>
